<!DOCTYPE html>
<html>
<head>
    <title>Discord Usage Time Predictor</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body>
    <h1>Discord Usage Time Predictor</h1>
    <p>Enter your Discord activity data:</p>

    <p>Servers Joined:
        <input type="number" id="servers" value="10">
    </p>

    <p>Messages per Day:
        <input type="number" id="messages" value="120">
    </p>

    <p>Voice Minutes per Week:
        <input type="number" id="voice" value="600">
    </p>

    <button onclick="predictUsage()">Predict Weekly Hours</button>

    <div id="result" style="display:none;">
        <h3>Estimated Discord Hours: <span id="hours"></span></h3>
    </div>

    <hr>
    <p>ITS 33000 Isaac Frump PyTorch - ONNX - Web Deployment</p>

    <script>
        let modelSession;
        let scalerParams;

        async function initialize() {
            scalerParams = await (await fetch("discord_scaler.json")).json();
            modelSession = await ort.InferenceSession.create("discord_hours.onnx");
        }

        async function predictUsage() {
            const servers = parseFloat(document.getElementById("servers").value);
            const messages = parseFloat(document.getElementById("messages").value);
            const voice = parseFloat(document.getElementById("voice").value);

            const s1 = (servers - scalerParams.mean[0]) / scalerParams.scale[0];
            const s2 = (messages - scalerParams.mean[1]) / scalerParams.scale[1];
            const s3 = (voice - scalerParams.mean[2]) / scalerParams.scale[2];

            const inputTensor = new ort.Tensor(
                "float32",
                [s1, s2, s3],
                [1, 3]
            );

            const output = await modelSession.run({ input: inputTensor });
            const prediction = output.output.data[0];

            document.getElementById("hours").innerText =
                prediction.toFixed(2) + " hrs/week";

            document.getElementById("result").style.display = "block";
        }

        initialize();
    </script>
</body>
</html>
